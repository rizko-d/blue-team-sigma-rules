extends: default

# Allow longer rule descriptions
# Max 160 chars recommended for Sigma compatibility

rules:
  line-length:
    max: 160
    level: warning
  truthy:
    allowed-values: ['true', 'false', 'yes', 'no', 'on', 'off']
  document-start: disable
  document-end: disable
  empty-lines:
    max: 2
    max-start: 0
    max-end: 1
  indentation:
    spaces: 2
    indent-sequences: consistent
  key-duplicates: enable
  trailing-spaces: enable