name: Sigma Rule Testing

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'rules/**'
      - 'tests/**'
      - '.github/workflows/sigma-test.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'rules/**'
      - 'tests/**'

jobs:
  test:
    name: Test Sigma Rules
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sigmatools==2.7.0 pyyaml pytest pytest-xdist

      - name: Validate rule syntax
        run: |
          echo "Validating YAML syntax..."
          find rules -name "*.yml" -o -name "*.yaml" | xargs -I {} sh -c 'python -c "import yaml; yaml.safe_load(open(\"{}\"))" && echo "OK: {}"'

      - name: Compile rules with sigmac
        run: |
          echo "Compiling rules to Elastic DSL..."
          mkdir -p build/elastic
          for rule in rules/**/*.yml; do
            echo "Compiling $rule..."
            sigmac -t elastic --format json "$rule" -o "build/elastic/$(basename "$rule" .yml).json" 2>&1 || true
          done

      - name: Run unit tests
        run: |
          echo "Running unit tests..."
          python -m pytest tests/ -v --tb=short -x

      - name: Check MITRE ATT&CK tag coverage
        run: |
          echo "Checking MITRE ATT&CK tag coverage..."
          python scripts/check_mitre_coverage.py

      - name: Upload compiled rules as artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-elastic-rules
          path: build/elastic/
          retention-days: 7

      - name: Generate coverage report
        if: always()
        run: |
          python scripts/generate_coverage_report.py > coverage-report.md
          cat coverage-report.md

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: mitre-coverage-report
          path: coverage-report.md
          retention-days: 30

  lint:
    name: Lint Rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run yamllint
        run: |
          pip install yamllint
          yamllint -c .yamllint.yml rules/

  validate-mitre:
    name: Validate MITRE Tags
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate ATT&CK tags
        run: |
          python scripts/validate_mitre_tags.py