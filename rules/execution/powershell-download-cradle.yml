title: PowerShell Download Cradle - IEX WebClient
id: dddddddd-aaaa-eeee-ffff-333333333333
status: test
description: Detects PowerShell download cradles commonly used for staging
references:
  - https://attack.mitre.org/techniques/T1059.001/
  - https://gist.github.com/HarmJ0y/bb48307ffa663256e239
author: Rizko Febri Rachmayadi
date: 2024-01-15
tags:
  - attack.execution
  - attack.t1059.001
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith:
      - \\powershell.exe
      - \\pwsh.exe
  download_cradle:
    CommandLine|contains|any:
      - 'Net.WebClient'
      - 'DownloadFile'
      - 'DownloadString'
      - 'DownloadData'
      - 'Invoke-WebRequest'
      - 'Invoke-RestMethod'
      - 'Start-BitsTransfer'
      - 'WinHttp.WinHttpRequest'
      - 'MSXML2.XMLHTTP'
      - 'System.Net.WebClient'
  iex_pattern:
    CommandLine|contains|any:
      - 'iex'
      - 'Invoke-Expression'
      - 'IEX'
  condition: selection and download_cradle and iex_pattern
falsepositives:
  - Legitimate software installation scripts
level: high

