title: Sudo Abuse and Sudo Caching Privilege Escalation
id: c3d4e5f6-a7b8-9012-cdef-123456789012
status: test
description: |
  Detects suspicious sudo usage patterns associated with privilege escalation,
  including sudo caching misuse (sudo -k, timestamp manipulation), sudoers file
  modifications, and privilege elevation from non-standard parent processes.
references:
  - https://attack.mitre.org/techniques/T1548/003/
  - https://www.elastic.co/guide/en/security/current/sudoers-file-modification.html
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1548.003/T1548.003.md
author: Rizko Febri Rachmayadi
date: 2024-07-23
modified: 2024-07-23
tags:
  - attack.privilege-escalation
  - attack.defense-evasion
  - attack.t1548.003
logsource:
  category: process_creation
  product: linux
detection:
  selection_shell_root:
    CommandLine|contains|all:
      - 'sudo'
      - 'bash'
      - '/root'
  selection_sudoers_edit:
    Image|endswith|any:
      - '/visudo'
      - '/sudoedit'
      - '/vim'
      - '/nano'
    CommandLine|contains:
      - 'sudoers'
  selection_sudoers_write:
    CommandLine|contains|all:
      - 'echo'
      - 'sudoers'
  selection_sudo_backdoor:
    CommandLine|contains|all:
      - '!authenticate'
      - 'NOPASSWD'
  selection_sudo_kill_ts:
    CommandLine|contains|all:
      - 'sudo'
      - '-k'
  selection_suid_root:
    CommandLine|contains|all:
      - 'chmod'
      - 'u+s'
      - '/bin/'
  condition: 1 of selection_*
falsepositives:
  - System administrator performing authorized maintenance
  - Package manager sudoers configuration
  - Authorized security testing
level: high
