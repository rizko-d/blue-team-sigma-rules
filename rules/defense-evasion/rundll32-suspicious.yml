title: Rundll32 Execution - Suspicious DLL or JavaScript
id: aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee
status: test
description: Detects rundll32.exe executing suspicious DLLs or inline JavaScript
references:
  - https://attack.mitre.org/techniques/T1218.011/
  - https://lolbas-project.github.io/lolbas/Binaries/Rundll32/
author: Rizko Febri Rachmayadi
date: 2024-01-15
tags:
  - attack.defense-evasion
  - attack.t1218.011
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: \\rundll32.exe
  js_pattern:
    CommandLine|contains: 'javascript:'
  shell_pattern:
    CommandLine|contains|all:
      - 'shell32.dll'
      - 'OpenAs_RunDLL'
  url_pattern:
    CommandLine|contains|all:
      - 'url.dll'
      - 'OpenURL'
      - 'http'
  suspicious_dll:
    CommandLine|contains|all:
      - '.dll'
      - 'appdata'
  condition: selection and (js_pattern or shell_pattern or url_pattern or suspicious_dll)
falsepositives:
  - Legitimate software using rundll32
level: medium

