title: Suspicious Mshta Execution
id: 11111111-2222-3333-4444-555555555555
status: test
description: Detects suspicious mshta.exe execution with remote content or script execution
references:
  - https://attack.mitre.org/techniques/T1218.005/
  - https://lolbas-project.github.io/lolbas/Binaries/Mshta/

related:
  - id: T1218.005
    type: mitre-attack

author: Rizko Febri Rachmayadi
date: 2024-01-15
tags:
  - attack.defense-evasion
  - attack.t1218.005
logsource:
  category: process_creation
  product: windows
detection:
  selection_mshta:
    Image|endswith: '\mshta.exe'
  selection_remote:
    CommandLine|contains|all:
      - 'http'
      - '.hta'
  selection_vbscript:
    CommandLine|contains|all:
      - 'vbscript:'
      - 'Execute'
  selection_javascript:
    CommandLine|contains|all:
      - 'javascript:'
      - 'eval'
  selection_suspicious_args:
    CommandLine|contains|any:
      - '//'
      - '.hta'
      - 'ms-hta:'
  condition: selection_mshta and (1 of selection_*)
falsepositives:
  - Legitimate HTA applications
level: high