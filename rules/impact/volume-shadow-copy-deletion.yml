title: Volume Shadow Copy Deletion - Ransomware Precursor
id: 66666666-aaaa-bbbb-cccc-111111111112
status: test
description: Detects deletion of Volume Shadow Copies, a common ransomware pre-encryption activity
references:
  - https://attack.mitre.org/techniques/T1490/
author: Rizko Febri Rachmayadi
date: 2024-01-15
tags:
  - attack.impact
  - attack.t1490
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: \\vssadmin.exe
    CommandLine|contains|any:
      - 'delete'
      - 'resize'
      - 'shadows'
  selection_wmic:
    Image|endswith: \\wmic.exe
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - \\powershell.exe
      - \\pwsh.exe
    CommandLine|contains|any:
      - 'DeleteShadowCopies'
      - 'Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Disk cleanup tasks
  - Backup software
level: critical

