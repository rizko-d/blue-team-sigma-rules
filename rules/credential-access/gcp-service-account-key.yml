title: GCP Service Account Key Creation or Download
id: a4b5c2d1-e3f4-5a67-9b0c-1f2a3b4c5d6e
status: test
description: |
  Detects the creation or download of service account keys in Google Cloud
  Platform. Attackers create service account keys to maintain persistent access
  and authenticate as privileged service principals (T1078.004).
references:
  - https://attack.mitre.org/techniques/T1078/004/
  - https://cloud.google.com/iam/docs/service-account-creds
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1078.004/T1078.004.md
author: Rizko Febri Rachmayadi
date: 2024-07-23
modified: 2024-07-23
tags:
  - attack.persistence
  - attack.t1078.004
  - attack.credential-access
logsource:
  category: audit_logs
  product: gcp
detection:
  selection_key_create:
    methodName|contains|any:
      - 'serviceAccounts.keys.create'
      - 'CreateServiceAccountKey'
      - 'google.iam.admin'
    serviceName|contains:
      - 'iam'
  selection_key_download:
    methodName|contains|any:
      - 'serviceAccounts.keys.get'
      - 'GetServiceAccountKey'
      - 'serviceAccounts.keys.list'
  selection_key_upload:
    methodName|contains|any:
      - 'serviceAccounts.keys.upload'
      - 'UploadServiceAccountKey'
  selection_external_key:
    methodName|contains|any:
      - 'serviceAccounts.keys.create'
    authenticationInfo.principalEmail|contains:
      - 'gserviceaccount.com'
  selection_privileged_sa:
    resource.name|contains|any:
      - 'admin'
      - 'admin-sa'
      - 'owner'
      - 'deploy'
      - 'terraform'
      - 'cloudbuild'
      - 'compute'
  condition: (1 of selection_key_create or selection_key_download or selection_key_upload) and (1 of selection_external_key or selection_privileged_sa)
falsepositives:
  - Authorized service account key rotation
  - CI/CD pipeline setup (Cloud Build, Terraform)
  - Application deployment automation
level: high
