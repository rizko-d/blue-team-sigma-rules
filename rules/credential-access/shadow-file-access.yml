title: Shadow File Access - Linux Credential Dumping
id: d4e5f6a7-b8c9-0123-defa-234567890123
status: test
description: |
  Detects access to /etc/shadow, /etc/passwd, or /etc/security/opasswd by
  non-standard processes. Attackers target these files to extract password hashes
  for offline cracking (T1003.008).
references:
  - https://attack.mitre.org/techniques/T1003/008/
  - https://www.elastic.co/guide/en/security/current/etc-shadow-access.html
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1003.008/T1003.008.md
author: Rizko Febri Rachmayadi
date: 2024-07-23
modified: 2024-07-23
tags:
  - attack.credential-access
  - attack.t1003.008
logsource:
  category: file_access
  product: linux
detection:
  selection_shadow:
    TargetFilename|contains|any:
      - '/etc/shadow'
      - '/etc/passwd-'
      - '/etc/security/opasswd'
      - '/etc/master.passwd'
  selection_suspicious_proc:
    Image|endswith|any:
      - '/cat'
      - '/head'
      - '/tail'
      - '/cut'
      - '/grep'
      - '/awk'
      - '/sed'
      - '/strings'
      - '/base64'
      - '/dd'
      - '/scp'
    Image|startswith|any:
      - '/usr/'
      - '/bin/'
  selection_compress:
    CommandLine|contains|any:
      - 'tar -czf'
      - 'zip -r'
      - 'gzip '
    CommandLine|contains:
      - '/etc'
  condition: selection_shadow and 1 of selection_*
falsepositives:
  - Legitimate system administration password operations (passwd, chage)
  - Backup software accessing /etc
  - Monitoring/audit tools (Lynis, OSSEC, AIDE)
level: critical
