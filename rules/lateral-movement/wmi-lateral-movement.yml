title: WMI Lateral Movement - Process Creation via WMIC
id: 55555555-6666-7777-8888-999999999999
status: test
description: Detects lateral movement using wmic.exe process call create
references:
  - https://attack.mitre.org/techniques/T1047/
  - https://attack.mitre.org/techniques/T1546.014/

related:
  - id: T1047
    type: mitre-attack
  - id: T1546.014
    type: mitre-attack

author: Rizko Febri Rachmayadi
date: 2024-01-15
tags:
  - attack.lateral-movement
  - attack.t1047
  - attack.t1546.014
logsource:
  category: process_creation
  product: windows
detection:
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'process'
      - 'call'
      - 'create'
  selection_remote:
    CommandLine|contains|any:
      - '/node:'
      - '\\\\'
  condition: selection_wmic and selection_remote
falsepositives:
  - Legitimate remote administration
level: high