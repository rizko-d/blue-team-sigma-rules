title: ISO/Mount Image Execution via Explorer or PowerShell
id: 3c4d5e6f-7a8b-9c0d-1e2f-3a4b5c6d7e8f
status: test
description: Detects mounting of ISO/VHD/VHDX files followed by execution of contents, a common initial access technique for malware delivery.
references:
  - https://attack.mitre.org/techniques/T1204/002/
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1204.002/T1204.002.md
author: Rizko Febri Rachmayadi
date: 2024-03-05
modified: 2024-06-15
tags:
  - attack.initial-access
  - attack.t1204.002
  - attack.defense-evasion
  - attack.t1218
logsource:
  category: process_creation
  product: windows
detection:
  selection_mount:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains|all:
      - 'Mount-DiskImage'
      - '.iso'
  selection_explorer_mount:
    Image|endswith: '\explorer.exe'
    CommandLine|contains:
      - '.iso'
      - '.vhd'
      - '.vhdx'
  selection_execution_from_mount:
    Image|contains:
      - ':\'
    ParentImage|endswith: '\explorer.exe'
    Image|endswith:
      - '.exe'
      - '.bat'
      - '.cmd'
      - '.ps1'
      - '.vbs'
      - '.js'
  condition: selection_mount or (selection_explorer_mount and selection_execution_from_mount)
falsepositives:
  - Legitimate software installation from ISO
  - IT administrators mounting images
level: medium