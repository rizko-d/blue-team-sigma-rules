title: Suspicious Microsoft Office Child Process
id: 1a2b3c4d-5e6f-7a8b-9c0d-1e2f3a4b5c6d
status: test
description: Detects suspicious child processes spawned by Microsoft Office applications (Word, Excel, PowerPoint, Outlook) which may indicate macro execution or exploit behavior.
references:
  - https://attack.mitre.org/techniques/T1204/002/
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1204.002/T1204.002.md

related:
  - id: T1059.005
    type: mitre-attack
  - id: T1204.002
    type: mitre-attack

author: Rizko Febri Rachmayadi
date: 2024-01-15
modified: 2024-06-15
tags:
  - attack.initial-access
  - attack.t1204.002
  - attack.execution
  - attack.t1059.005
logsource:
  category: process_creation
  product: windows
detection:
  selection_office_parents:
    ParentImage|endswith:
      - '\WINWORD.EXE'
      - '\EXCEL.EXE'
      - '\POWERPNT.EXE'
      - '\OUTLOOK.EXE'
      - '\MSACCESS.EXE'
      - '\MSPUB.EXE'
      - '\VISIO.EXE'
  selection_suspicious_children:
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\mshta.exe'
      - '\regsvr32.exe'
      - '\rundll32.exe'
      - '\certutil.exe'
      - '\bitsadmin.exe'
      - '\wmic.exe'
      - '\schtasks.exe'
      - '\at.exe'
      - '\ftp.exe'
      - '\tftp.exe'
      - '\powershell_ise.exe'
  selection_suspicious_paths:
    Image|contains:
      - '\Temp\'
      - '\AppData\Local\Temp\'
      - '\AppData\Roaming\Microsoft\Windows\Start Menu\Programs\Startup\'
      - '\Public\'
      - '\ProgramData\'
  condition: selection_office_parents and (selection_suspicious_children or selection_suspicious_paths)
falsepositives:
  - Legitimate macros or add-ins spawning child processes
  - Automated document processing workflows
level: high