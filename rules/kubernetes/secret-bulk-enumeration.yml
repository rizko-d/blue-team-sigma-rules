title: Kubernetes Secret Bulk Enumeration
id: a1000001-0001-4000-8000-000000000006
status: test
description: |
  Detects bulk read or list operations on Kubernetes Secrets from a single
  user or source IP within a short time window. Attackers enumerate secrets
  to steal service account tokens, database credentials, TLS certificates,
  and API keys for lateral movement and privilege escalation.
references:
  - https://attack.mitre.org/techniques/T1552/007/
  - https://kubernetes.io/docs/concepts/configuration/secret/
  - https://www.cyberark.com/resources/threat-research-blog/kubernetes-secret-abuse
author: Rizko Febri Rachmayadi
date: 2024-07-23
modified: 2024-07-23
tags:
  - attack.credential-access
  - attack.t1552.007
related:
  - id: T1552.007
    type: mitre-attack
logsource:
  category: container
  product: kubernetes
detection:
  selection_secret_access:
    verb|contains|any:
      - 'get'
      - 'list'
      - 'watch'
  selection_resource:
    objectRef.resource: 'secrets'
  selection_no_namespace:
    objectRef.namespace|contains:
      - ''
  condition: selection_secret_access and selection_resource
falsepositives:
  - CI/CD pipelines pulling secrets for deployment
  - Secret management operators reconciling state
  - Kubernetes controllers (service account token controller)
level: medium
